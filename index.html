<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shot Planner (Vanilla) v147</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
  <div class="brand-pill">
    <div class="brand-badge">SD</div>
    <div class="brand-text">Shot Planner</div>
  </div>

  <div class="action-pill">
    <button id="btn-undo" class="iconbtn" title="Undo (Ctrl+Z)"><span class="material-symbols-outlined">undo</span></button>
    <button id="btn-redo" class="iconbtn" title="Redo (Ctrl+Y / Ctrl+Shift+Z)"><span class="material-symbols-outlined">redo</span></button>
    <div class="pill-sep"></div>
    <button id="btn-save" class="iconbtn" title="Save JSON"><span class="material-symbols-outlined">download</span></button>
    <label class="iconbtn file" title="Load JSON">
      <span class="material-symbols-outlined">upload</span>
      <input id="file-load" type="file" accept="application/json" />
    </label>
    <button id="btn-export-csv" class="iconbtn" title="Export Shots CSV"><span class="material-symbols-outlined">table_view</span></button>
  </div>
</header>


  <main class="layout">
    <aside class="toolbar">
  <div class="toolstack">

    <div class="toolicon-wrap" id="add-scene-wrap">
      <button id="btn-scene" class="toolicon" title="Scenes (click to add new)">
        <span class="material-symbols-outlined">theaters</span>
      </button>
      <div class="preset-menu" id="scene-menu" aria-label="Scenes"></div>
    </div>

    <div class="toolicon-wrap" id="add-character-wrap">
      <button class="toolicon" data-add="character" title="Add Character">
        <span class="material-symbols-outlined">person</span>
      </button>
      <div class="preset-menu" id="character-presets" aria-label="Character presets">
        <button class="preset-item" type="button" data-character-preset="Jesus" data-color="#3b82f6"><span class="dot" style="--dot:#3b82f6"></span>Jesus</button>
        <button class="preset-item" type="button" data-character-preset="Apostle" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Apostle</button>
        <button class="preset-item" type="button" data-character-preset="John" data-color="#22c55e"><span class="dot" style="--dot:#22c55e"></span>John</button>
        <button class="preset-item" type="button" data-character-preset="Peter" data-color="#ef4444"><span class="dot" style="--dot:#ef4444"></span>Peter</button>
        <button class="preset-item" type="button" data-character-preset="James" data-color="#f59e0b"><span class="dot" style="--dot:#f59e0b"></span>James</button>
        <button class="preset-item" type="button" data-character-preset="Andrew" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Andrew</button>
        <button class="preset-item" type="button" data-character-preset="Matthew" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Matthew</button>
        <button class="preset-item" type="button" data-character-preset="Matthias" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Matthias</button>
        <button class="preset-item" type="button" data-character-preset="Philip" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Philip</button>
        <button class="preset-item" type="button" data-character-preset="Thomas" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Thomas</button>

        <button class="preset-item" type="button" data-character-preset="Nathanael" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Nathanael</button>
        <button class="preset-item" type="button" data-character-preset="Simon" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Simon</button>
        <button class="preset-item" type="button" data-character-preset="Thaddaeus" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>Thaddaeus</button>
        <button class="preset-item" type="button" data-character-preset="James (SOA)" data-color="#6b7280"><span class="dot" style="--dot:#6b7280"></span>James (SOA)</button>

      </div>
    </div>
    <button class="toolicon" data-add="camera" title="Add Camera">
      <span class="material-symbols-outlined">videocam</span>
    </button>
    <button class="toolicon" data-add="wall" title="Add Wall">
      <span class="material-symbols-outlined">remove</span>
    </button>
    <button class="toolicon" data-add="furniture" title="Add Furniture">
      <span class="material-symbols-outlined">crop_square</span>
    </button>
    <div class="toolsep"></div>
    <button id="btn-delete" class="toolicon danger" title="Delete (Del)" disabled>
      <span class="material-symbols-outlined">delete</span>
    </button>
  </div>
</aside>


    <section class="canvas-wrap">
      <canvas id="scene" width="1200" height="800"></canvas>
      <div class="hud">
        <div class="pill" style="display:flex; align-items:center; gap:8px;">
          <button id="btn-zoom-out" type="button" aria-label="Zoom out" style="all:unset; cursor:pointer; font-weight:800; font-size:16px; line-height:1;">−</button>
          <div id="hud-zoom">100%</div>
          <button id="btn-zoom-in" type="button" aria-label="Zoom in" style="all:unset; cursor:pointer; font-weight:800; font-size:16px; line-height:1;">+</button>
        </div>
        
      </div>
    </section>

    <aside class="props">
      <div class="panel">
        <div class="panel-title">Properties</div>
        <div id="props-empty" class="muted">Select an element to edit.
        </div>

        <form id="scene-form" class="form hidden">
          <div class="row">
            <label>Scene #</label>
            <input id="p-scene" type="text" />
          </div>

          <div class="row">
            <label>Color</label>
            <div class="palette" id="scene-palette">
              <button type="button" class="swatch" data-color="#ef4444"></button>
              <button type="button" class="swatch" data-color="#f97316"></button>
              <button type="button" class="swatch" data-color="#f59e0b"></button>
              <button type="button" class="swatch" data-color="#22c55e"></button>
              <button type="button" class="swatch" data-color="#06b6d4"></button>
              <button type="button" class="swatch" data-color="#3b82f6"></button>
              <button type="button" class="swatch" data-color="#6366f1"></button>
              <button type="button" class="swatch" data-color="#a855f7"></button>
              <button type="button" class="swatch" data-color="#ec4899"></button>
              <button type="button" class="swatch" data-color="#6b7280"></button>
              <button type="button" class="swatch" data-color="#ffffff"></button>
            </div>
          </div>
        
          <div class="toolsep"></div>
          <button id="btn-delete-scene" type="button" class="btn danger">Delete Scene</button>
</form>

        <form id="props-form" class="form hidden">
          <div class="row">
            <label>ID</label>
            <input id="p-id" type="text" disabled />
          </div>

          <div class="row">
            <label>Type</label>
            <input id="p-type" type="text" disabled />
          </div>

          
    
<div class="row hidden" id="row-character-name">
  <label>Character Name</label>
  <input id="p-characterName" type="text" />
</div>



    

          









<div class="grid2">
            <div class="row">
              <label>X</label>
              <input id="p-x" type="number" step="1" />
            </div>
            <div class="row">
              <label>Y</label>
              <input id="p-y" type="number" step="1" />
            </div>
          </div>

          <div class="grid2">
            <div class="row">
              <label>Scale X</label>
              <input id="p-sx" type="number" step="0.05" min="0.1" max="10" />
            </div>
            <div class="row">
              <label>Scale Y</label>
              <input id="p-sy" type="number" step="0.05" min="0.1" max="10" />
            </div>
          </div>

          <div id="camera-fields" class="hidden">
<div class="grid2" id="row-camera-id-shot">
      <div class="row">
        <label>Camera ID</label>
        <input id="p-label" type="text" />
      </div>
      <div class="row" id="row-shotNumber">
        <label>Shot #</label>
        <input id="p-shotNumber" type="text" />
      </div>
    </div>
<div class="grid2" id="row-shottype-lens">
  <div class="row">
    <label>Shot Type</label>
    <select id="p-shotType">
      <option value="">(none)</option>
      <option>EWS</option><option>WS</option><option>MWS</option><option>FS</option>
      <option>MS</option><option>MCU</option><option>CU</option><option>ECU</option>
    </select>
  </div>
  <div class="row">
    <label>Lens</label>
    <select id="p-lens">
                <option value="25mm">25mm</option>
                <option value="35mm">35mm</option>
                <option value="40mm">40mm</option>
                <option value="50mm">50mm</option>
                <option value="65mm">65mm</option>
                <option value="85mm">85mm</option>
                <option value="105mm">105mm</option>
</select>
  </div>
</div>
<div class="grid2" id="row-scene-setup">
  <div class="row">
    <label>Scene #</label>
    <input id="p-sceneNumber" type="text" />
  </div>
<div class="row">
    <label>Setup #</label>
    <input id="p-setupNumber" type="text" />
  </div>
</div>
<div class="row" id="row-camera-support">
    <label>Camera Support</label>
                  <select id="p-cameraSupport">
                    <option value="">—</option>
                                    <option value="Tripod">Tripod</option>
    <option value="Dolly">Dolly</option>
                    <option value="Drone">Drone</option>
                    <option value="Gimbal">Gimbal</option>
                    <option value="Handheld">Handheld</option>
                    <option value="Jib">Jib</option>
                    <option value="MovieBird">MovieBird</option>
                    <option value="Slider">Slider</option>
                    <option value="Trinity">Trinity</option>
                  </select>
  </div>

            <div class="row">
              <label>Nickname</label>
              <input id="p-nickname" type="text" />
            </div>
            <div class="row">
              <label>Tech Notes</label>
              <textarea id="p-techNotes" rows="3"></textarea>
            </div>
            <div class="row">
              <label>Production Notes</label>
              <textarea id="p-productionNotes" rows="3"></textarea>
            </div>
          </div>

          
    <div class="row hidden" id="row-camera-color">
      <label>Color</label>
      <div class="palette" id="camera-palette">
        <button type="button" class="swatch" data-color="#ef4444"></button>
        <button type="button" class="swatch" data-color="#f97316"></button>
        <button type="button" class="swatch" data-color="#f59e0b"></button>
        <button type="button" class="swatch" data-color="#22c55e"></button>
        <button type="button" class="swatch" data-color="#14b8a6"></button>
        <button type="button" class="swatch" data-color="#3b82f6"></button>
        <button type="button" class="swatch" data-color="#6366f1"></button>
        <button type="button" class="swatch" data-color="#a855f7"></button>
        <button type="button" class="swatch" data-color="#ec4899"></button>
        <button type="button" class="swatch" data-color="#9ca3af"></button>
        <button type="button" class="swatch" data-color="#ffffff"></button>
      </div>
    </div>
          <div class="row hidden" id="row-trackto">
            <label></label>
            <button type="button" id="btn-trackto" class="primarybtn">Track To...</button>
          </div>

          <div class="row hidden" id="row-trackmode">
            <label for="p-trackmode">Track</label>
            <select id="p-trackmode">
              <option value="to">Track to</option>
              <option value="from">Track from</option>
              <option value="between">Track between</option>
            </select>
          </div>

</form>
      </div>
    </aside>
  </main>


  <!-- Clear All Modal -->
  <div id="modal-clear" class="sp-modal" aria-hidden="true">
    <div class="sp-modal-backdrop" data-close="1"></div>
    <div class="sp-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-clear-title">
      <div class="sp-modal-title" id="modal-clear-title">Clear everything?</div>
      <div class="sp-modal-body">This will delete all items on the canvas. This can be undone.</div>
      <div class="sp-modal-actions">
        <button id="modal-clear-no" class="btn">Cancel</button>
        <button id="modal-clear-yes" class="btn danger">Yes, clear all</button>
      </div>
    </div>
  </div>


  <script type="module" src="./app.js"></script>

  <!-- Delete Scene Modal -->
  <div id="modal-delete-scene" class="sp-modal" aria-hidden="true">
    <div class="sp-modal-backdrop" data-close="1"></div>
    <div class="sp-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-delete-scene-title">
      <div class="sp-modal-title" id="modal-delete-scene-title">Delete this scene?</div>
      <div class="sp-modal-body">This will permanently delete the current scene and everything on its canvas.</div>
      <div class="sp-modal-actions">
        <button class="btn" data-close="1" type="button">Cancel</button>
        <button id="btn-confirm-delete-scene" class="btn danger" type="button">Delete</button>
      </div>
    </div>
  </div>

</body>
</html>
